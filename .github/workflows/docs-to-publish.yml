name: Test building docs "to publish" when they're updated

on:
  push:
    # Run when a change to these files is pushed to any branch. Without the "branches:" line, for some reason this will be run whenever a tag is pushed, even if the listed files aren't changed.
    branches: ['*']
    paths:
      - 'doc/doc-builder'
      - 'doc/build_docs_to_publish'
      - '.github/workflows/docs-to-publish.yml'

  pull_request:
    # Run on pull requests that change the listed files
    paths:
      - 'doc/doc-builder'
      - 'doc/build_docs_to_publish'
      - '.github/workflows/docs-to-publish.yml'

  workflow_dispatch:

permissions:
  contents: read
jobs:

  test-build-docs-to-publish-container:
    if: ${{ always() }}
    name: With container from registry
    runs-on: ubuntu-latest
    steps:

      - name: Checkout repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2
        with:
          submodules: true

      - name: Build docs using Docker (Podman has trouble on GitHub runners)
        id: build-docs
        run: |
          set -o pipefail
          mkdir -p build-logs
          [[ -e doc ]] && cd doc
          git fetch
          site_root="https://${GITHUB_REPOSITORY%/*}.github.io/${GITHUB_REPOSITORY#*/}"
          PYTHONUNBUFFERED=1 ./build_docs_to_publish -r ${PWD}/_build -d --verbose --site-root "${site_root}"
